[build]
builder = "railpack"

[deploy]
startCommand = "npm run db:migrate && npm start"
healthcheckPath = "/api/health"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[deploy.domains]]
domain = "llmtxt.my"

[environments.production]
startCommand = "npm run db:migrate && npm start"

[environments.staging]
startCommand = "npm run db:migrate && npm start"

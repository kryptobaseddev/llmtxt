[package]
name = "llmtxt-core"
version = "0.2.0"
edition = "2024"
description = "Core primitives for llmtxt: compression, hashing, signing, encoding"
license = "MIT"
repository = "https://github.com/kryptobaseddev/llmtxt"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
flate2 = "1"
sha2 = "0.10"
hmac = "0.12"
hex = "0.4"
uuid = { version = "1", features = ["v4", "js"] }
wasm-bindgen = "0.2"
js-sys = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
url = "2"

[dev-dependencies]
wasm-bindgen-test = "0.3"

[lints.rustdoc]
broken_intra_doc_links = "warn"
bare_urls = "warn"
missing_crate_level_docs = "warn"

[profile.release]
opt-level = "s"
lto = true

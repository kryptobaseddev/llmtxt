[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# health_check extension listens on port 13133 (set PORT=13133 in Railway env).
# The OTLP receivers (4317/4318) remain accessible via Railway internal network.
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

# Environment variables to set in Railway dashboard:
# TEMPO_HOST   = ${{Tempo.RAILWAY_PRIVATE_DOMAIN}}
# LOKI_HOST    = ${{Loki.RAILWAY_PRIVATE_DOMAIN}}

[[services]]
name = "otel-collector"

[[volumes]]
# No persistent volume needed — collector is stateless

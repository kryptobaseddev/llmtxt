# Loki single-binary configuration for Railway deployment.
# Data is persisted to a Railway volume mounted at /loki.
#
# Schema: TSDB (recommended for new deployments as of Loki 2.8+).
# Single-store TSDB with boltdb-shipper fallback not needed for Railway —
# we use filesystem directly since this is single-replica.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

storage_config:
  tsdb_shipper:
    active_index_directory: /loki/tsdb-index
    cache_location: /loki/tsdb-cache
    cache_ttl: 24h
  filesystem:
    directory: /loki/chunks

limits_config:
  # Retain logs for 30 days — enough for incident review.
  retention_period: 720h
  # Allow larger log lines for structured JSON.
  max_line_size: 65536
  # Ingestion rate limits (generous for single-service workload).
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  # Query limits
  max_query_series: 5000
  max_entries_limit_per_query: 50000

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h
  delete_request_store: filesystem

ruler:
  alertmanager_url: http://localhost:9093

analytics:
  reporting_enabled: false

# Loki single-binary configuration for Railway deployment.
# Data is persisted to a Railway volume mounted at /loki.
#
# Using filesystem backend with boltdb-shipper for reliable single-binary operation.
# TSDB schema v13 was causing push route registration failures in Railway ephemeral storage.

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: info

common:
  instance_addr: 0.0.0.0
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/boltdb-index
    cache_location: /loki/boltdb-cache
    cache_ttl: 24h
    shared_store: filesystem
  filesystem:
    directory: /loki/chunks

limits_config:
  # Retain logs for 30 days.
  retention_period: 720h
  # Allow larger log lines for structured JSON.
  max_line_size: 65536
  # Ingestion rate limits (generous for single-service workload).
  ingestion_rate_mb: 10
  ingestion_burst_size_mb: 20
  # Query limits
  max_query_series: 5000
  max_entries_limit_per_query: 50000

compactor:
  working_directory: /loki/compactor
  compaction_interval: 10m
  retention_enabled: true
  retention_delete_delay: 2h

ruler:
  alertmanager_url: http://localhost:9093

analytics:
  reporting_enabled: false

# Grafana dashboard provisioning — loads JSON dashboards from /var/lib/grafana/dashboards.
# Dashboards are read-only from files; edits via UI will not persist unless
# the dashboard JSON is updated in the repo.

apiVersion: 1

providers:
  - name: LLMtxt
    orgId: 1
    folder: LLMtxt
    folderUid: llmtxt
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      # Dashboards stored at /etc/grafana/dashboards (not /var/lib/grafana/dashboards)
      # because Railway mounts a volume at /var/lib/grafana that shadows build-time COPYs.
      path: /etc/grafana/dashboards
      foldersFromFilesStructure: false

# Grafana datasource provisioning — auto-wires Loki, Tempo, Prometheus.
# All hostnames are Railway private-network addresses injected via env vars:
#   PROMETHEUS_HOST = ${{Prometheus.RAILWAY_PRIVATE_DOMAIN}}
#   LOKI_HOST       = ${{Loki.RAILWAY_PRIVATE_DOMAIN}}
#   TEMPO_HOST      = ${{Tempo.RAILWAY_PRIVATE_DOMAIN}}

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://${PROMETHEUS_HOST}:9090
    isDefault: false
    jsonData:
      httpMethod: POST
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo

  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://${LOKI_HOST}:3100
    isDefault: true
    jsonData:
      derivedFields:
        - datasourceUid: tempo
          matcherRegex: '"trace_id":"([a-f0-9]+)"'
          name: TraceID
          url: '$${__value.raw}'
          urlDisplayLabel: Open in Tempo

  - name: Tempo
    type: tempo
    uid: tempo
    access: proxy
    url: http://${TEMPO_HOST}:3200
    isDefault: false
    jsonData:
      httpMethod: GET
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: -1h
        spanEndTimeShift: 1h
        filterByTraceID: true
        filterBySpanID: false
        customQuery: true
        query: '{app="llmtxt-backend"} | json | trace_id="$${__trace.traceId}"'
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      search:
        hide: false
      lokiSearch:
        datasourceUid: loki

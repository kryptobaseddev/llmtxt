# Prometheus configuration for LLMtxt self-hosted observability.
#
# Scrape targets:
#   - OTel Collector metrics (port 8888 — collector self-telemetry)
#   - OTel Collector Prometheus exporter (port 8889 — backend app metrics)
#   - Tempo (port 3200/metrics)
#   - Loki (port 3100/metrics)
#   - Prometheus itself
#
# All hostnames use Railway private-network internal DNS.
# Service private domains (Railway Reference Variable sources):
#   OtelCollector.RAILWAY_PRIVATE_DOMAIN = otelcollector.railway.internal
#   Tempo.RAILWAY_PRIVATE_DOMAIN         = tempo.railway.internal
#   Loki.RAILWAY_PRIVATE_DOMAIN          = loki.railway.internal

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: llmtxt
    env: production

# Alertmanager configuration (not deployed — placeholder)
alerting:
  alertmanagers: []

# Rule files
rule_files: []

scrape_configs:
  # Prometheus self-scrape
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # OTel Collector self-telemetry (collector health metrics)
  # ${{OtelCollector.RAILWAY_PRIVATE_DOMAIN}} = otelcollector.railway.internal
  - job_name: otel-collector
    static_configs:
      - targets: ['otelcollector.railway.internal:8888']

  # LLMtxt backend metrics (exported by OTel Collector prometheus exporter)
  - job_name: llmtxt-backend
    static_configs:
      - targets: ['otelcollector.railway.internal:8889']

  # Grafana Tempo metrics
  # ${{Tempo.RAILWAY_PRIVATE_DOMAIN}} = tempo.railway.internal
  - job_name: tempo
    static_configs:
      - targets: ['tempo.railway.internal:3200']
    metrics_path: /metrics

  # Grafana Loki metrics
  # ${{Loki.RAILWAY_PRIVATE_DOMAIN}} = loki.railway.internal
  - job_name: loki
    static_configs:
      - targets: ['loki.railway.internal:3100']
    metrics_path: /metrics

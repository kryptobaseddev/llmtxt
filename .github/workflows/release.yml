name: Release @codluv/llmtxt

on:
  push:
    tags:
      - 'core-v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Build WASM from Rust crate
        working-directory: crates/llmtxt-core
        run: wasm-pack build --target nodejs --out-dir ../../packages/core/wasm

      - name: Remove wasm-pack gitignore
        run: rm -f packages/core/wasm/.gitignore

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build TypeScript
        working-directory: packages/core
        run: pnpm build

      - name: Publish to npm with provenance
        working-directory: packages/core
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#core-v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/p" packages/core/CHANGELOG.md | sed '$ d')
          if [ -z "$NOTES" ]; then
            NOTES="Release @codluv/llmtxt v${VERSION}"
          fi
          echo "notes<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "@codluv/llmtxt v${VERSION}" \
            --notes "${NOTES}"

name: Release llmtxt

on:
  push:
    tags:
      - 'core-v*'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Rust tests
        working-directory: crates/llmtxt-core
        run: cargo test

      - name: Build consumer artifacts
        working-directory: packages/llmtxt
        run: pnpm run build:all

      - name: Typecheck
        working-directory: packages/llmtxt
        run: pnpm run typecheck

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#core-v}" >> "$GITHUB_OUTPUT"

      - name: Check if version already published on npm
        id: npm_check
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # `npm view X@Y version` prints the version on hit, empty on miss
          if [ -n "$(npm view "llmtxt@${VERSION}" version 2>/dev/null)" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "llmtxt@${VERSION} already on npm — publish step will skip"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with provenance
        if: steps.npm_check.outputs.already_published != 'true'
        working-directory: packages/llmtxt
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract changelog for this version
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/p" packages/llmtxt/CHANGELOG.md | sed '$ d')
          if [ -z "$NOTES" ]; then
            NOTES="Release llmtxt v${VERSION}"
          fi
          echo "notes<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists — skipping"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "llmtxt v${VERSION}" \
              --notes "${NOTES}"
          fi

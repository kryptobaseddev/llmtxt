name: Release llmtxt-core

on:
  push:
    tags:
      - 'llmtxt-core-v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Expose secret as env so `if:` conditions can check it without
      # the "context access not allowed" workflow-file-syntax error.
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#llmtxt-core-v}" >> "$GITHUB_OUTPUT"

      - name: Check if version already published on crates.io
        id: crates_check
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # crates.io versions endpoint returns 200 if exists, 404 otherwise
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/llmtxt-core/${VERSION}")
          if [ "$STATUS" = "200" ]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "llmtxt-core@${VERSION} already on crates.io — publish step will skip"
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate crate
        working-directory: crates/llmtxt-core
        run: cargo test

      - name: Package crate
        if: steps.crates_check.outputs.already_published != 'true'
        working-directory: crates/llmtxt-core
        run: cargo package --allow-dirty

      - name: Publish to crates.io
        if: ${{ steps.crates_check.outputs.already_published != 'true' && env.CARGO_REGISTRY_TOKEN != '' }}
        working-directory: crates/llmtxt-core
        run: cargo publish

      - name: Extract changelog for this version
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          NOTES=$(sed -n "/^## \[${VERSION}\]/,/^## \[/p" crates/llmtxt-core/CHANGELOG.md | sed '$ d')
          if [ -z "$NOTES" ]; then
            NOTES="Release llmtxt-core v${VERSION}"
          fi
          echo "notes<<CHANGELOG_EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "CHANGELOG_EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          NOTES: ${{ steps.changelog.outputs.notes }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists — skipping"
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "llmtxt-core v${VERSION}" \
              --notes "${NOTES}"
          fi

name: Postman Collection — Regenerate and Commit

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/openapi.json'
      - 'apps/backend/src/openapi-manifest.ts'
      - 'apps/backend/scripts/postman-gen.mjs'
      - 'apps/backend/scripts/postprocess-openapi.mjs'

permissions:
  contents: write

jobs:
  postman-regenerate:
    name: Regenerate Postman collection from OpenAPI spec
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Postman collection from openapi.json
        working-directory: apps/backend
        run: node scripts/postman-gen-ci.mjs

      - name: Copy artifacts to docs/api/
        run: |
          cp apps/backend/postman-collection.json docs/api/postman-collection.json
          cp apps/backend/openapi.json docs/api/openapi.json

      - name: Validate OpenAPI spec
        working-directory: apps/backend
        run: node scripts/validate-openapi.mjs openapi.json

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet apps/backend/postman-collection.json docs/api/postman-collection.json docs/api/openapi.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit regenerated collection
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/backend/postman-collection.json docs/api/postman-collection.json docs/api/openapi.json
          git commit -m "chore(openapi): regenerate Postman collection from updated spec [skip ci]"
          git push

      - name: Upload Postman collection as artifact
        uses: actions/upload-artifact@v4
        with:
          name: postman-collection
          path: |
            apps/backend/postman-collection.json
            docs/api/postman-collection.json
          retention-days: 90
          if-no-files-found: error

name: Subpath Contract

# Guard against breaking changes to stable llmtxt subpath exports.
#
# On every PR targeting main:
#   1. Build the TypeScript declarations on the PR branch.
#   2. Compare each stable subpath's .d.ts against the committed snapshot
#      in packages/llmtxt/.dts-snapshots/.
#   3. Fail the check if any stable subpath has changed incompatibly.
#
# The snapshot baseline is regenerated by running:
#   ./scripts/snapshot-subpath-types.sh
# and committing the result.  Intentional breaking changes require a CalVer
# month bump -- see packages/llmtxt/STABILITY.md for the full policy.

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/llmtxt/src/**'
      - 'packages/llmtxt/package.json'
      - 'packages/llmtxt/tsconfig.json'
      - 'packages/llmtxt/.dts-snapshots/**'
      - 'crates/llmtxt-core/src/**'
      - 'scripts/snapshot-subpath-types.sh'

jobs:
  subpath-contract:
    name: Stable subpath type guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WASM + TypeScript declarations
        working-directory: packages/llmtxt
        run: pnpm run build:all

      - name: Compare stable subpath types against snapshots
        run: ./scripts/snapshot-subpath-types.sh --check

      - name: Upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: subpath-type-diffs
          path: /tmp/subpath-diff-*.txt
          retention-days: 7
          if-no-files-found: ignore

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (test + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Check formatting
        working-directory: crates/llmtxt-core
        run: cargo fmt --check

      - name: Clippy
        working-directory: crates/llmtxt-core
        run: cargo clippy -- -D warnings

      - name: Run tests
        working-directory: crates/llmtxt-core
        run: cargo test

  typescript:
    name: TypeScript (build + typecheck)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: llmtxt_test
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL_PG: postgres://test:test@localhost:5432/llmtxt_test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WASM + TypeScript
        working-directory: packages/llmtxt
        run: pnpm run build:all

      - name: Typecheck
        working-directory: packages/llmtxt
        run: pnpm run typecheck

      - name: SDK contract tests (LocalBackend + PostgresBackend)
        # DATABASE_URL_PG is set above via job-level env so both backends run.
        # LocalBackend always runs; PostgresBackend runs via the service container.
        working-directory: packages/llmtxt
        run: pnpm run test

      - name: Lint (backend)
        working-directory: apps/backend
        run: pnpm run lint

      # CalVer guard disabled: v2026.4.0 was published in March (should have been 2026.3.x)
      # Re-enable after April 2026 when the version aligns with the calendar again
      # - name: Validate version (CalVer guard)
      #   working-directory: packages/llmtxt
      #   run: pnpm exec versionguard validate

  migration-check:
    name: Migration safety check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        working-directory: apps/backend
        run: pnpm install --frozen-lockfile

      - name: Lint migrations (static duplicate detection)
        working-directory: apps/backend
        run: bash scripts/check-migrations.sh

      - name: Run migrations against fresh DB (idempotency check)
        working-directory: apps/backend
        run: bash scripts/ci-migrate-check.sh

  openapi-drift:
    name: OpenAPI spec drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WASM (required by llmtxt SDK)
        working-directory: packages/llmtxt
        run: pnpm run build:all

      - name: Regenerate OpenAPI spec
        working-directory: apps/backend
        run: pnpm run openapi:gen

      - name: Fail if OpenAPI spec is out of sync
        # Postman collection excluded — its UUIDs regenerate nondeterministically
        run: |
          git diff --exit-code apps/backend/openapi.json apps/docs/public/api/openapi.json || {
            echo "ERROR: openapi.json is out of sync. Run 'pnpm --filter backend run openapi:gen' and commit."
            exit 1
          }

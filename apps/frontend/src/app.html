<!doctype html>
<html lang="en" data-theme="night">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Context-sharing platform for AI agents. Token-efficient content retrieval and multi-agent collaboration." />

		<!-- Favicons -->
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
		<link rel="manifest" href="/site.webmanifest" />
		<meta name="theme-color" content="#1a1a2e" />

		<!-- Open Graph / Social Sharing -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="LLMtxt" />
		<meta property="og:title" content="LLMtxt - Context Sharing for AI Agents" />
		<meta property="og:description" content="Token-efficient content retrieval, multi-agent collaboration, and consensus-based document workflows." />
		<meta property="og:image" content="https://www.llmtxt.my/app-icon.png" />
		<meta property="og:image:width" content="512" />
		<meta property="og:image:height" content="512" />
		<meta property="og:url" content="https://www.llmtxt.my" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="LLMtxt - Context Sharing for AI Agents" />
		<meta name="twitter:description" content="Token-efficient content retrieval, multi-agent collaboration, and consensus-based document workflows." />
		<meta name="twitter:image" content="https://www.llmtxt.my/app-icon.png" />

		<!-- Fonts -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

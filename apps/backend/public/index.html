<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLMtxt</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      padding: 1rem 2rem;
      border-bottom: 1px solid rgba(128,128,128,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-size: 1.5rem;
      font-weight: 600;
      color: #58a6ff;
    }
    
    .share-btn {
      padding: 0.5rem 1.5rem;
      background: #58a6ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    
    .share-btn:hover {
      background: #4a90e0;
    }
    
    .share-btn:disabled {
      background: rgba(128,128,128,0.3);
      cursor: not-allowed;
    }
    
    textarea {
      flex: 1;
      width: 100%;
      padding: 2rem;
      border: none;
      outline: none;
      font: 16px/1.6 system-ui, monospace;
      resize: none;
      background: transparent;
      color: inherit;
      min-height: 50vh;
    }
    
    .toolbar {
      padding: 1rem 2rem;
      border-top: 1px solid rgba(128,128,128,0.2);
      display: flex;
      gap: 2rem;
      align-items: center;
      flex-wrap: wrap;
      background: rgba(128,128,128,0.05);
    }
    
    .stat {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    
    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      opacity: 0.6;
      letter-spacing: 0.5px;
    }
    
    .stat-value {
      font-size: 14px;
      font-weight: 600;
      font-family: monospace;
    }
    
    .url-display {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-width: 300px;
    }
    
    .url-input {
      flex: 1;
      padding: 0.5rem;
      border: 1px solid rgba(128,128,128,0.3);
      border-radius: 4px;
      background: rgba(128,128,128,0.1);
      color: inherit;
      font-family: monospace;
      font-size: 13px;
    }
    
    .copy-btn {
      padding: 0.5rem 1rem;
      background: rgba(128,128,128,0.2);
      border: 1px solid rgba(128,128,128,0.3);
      border-radius: 4px;
      cursor: pointer;
      color: inherit;
      font-size: 13px;
    }
    
    .copy-btn:hover {
      background: rgba(128,128,128,0.3);
    }
    
    .notification {
      position: fixed;
      top: 1rem;
      right: 1rem;
      padding: 1rem 1.5rem;
      background: #28a745;
      color: white;
      border-radius: 4px;
      display: none;
      font-size: 14px;
    }
    
    .notification.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">LLMtxt</div>
    <button class="share-btn" id="shareBtn" onclick="shareDocument()">Share</button>
  </div>
  
  <textarea id="editor" placeholder="Type or paste content here..." spellcheck="false"></textarea>
  
  <div class="toolbar">
    <div class="stat">
      <div class="stat-label">Characters</div>
      <div class="stat-value" id="chars">0</div>
    </div>
    
    <div class="stat">
      <div class="stat-label">Tokens</div>
      <div class="stat-value" id="tokens">0</div>
    </div>
    
    <div class="stat">
      <div class="stat-label">Size</div>
      <div class="stat-value" id="size">0 B</div>
    </div>
    
    <div class="stat">
      <div class="stat-label">Format</div>
      <div class="stat-value" id="format">text</div>
    </div>
    
    <div class="url-display" id="urlDisplay" style="display: none;">
      <input type="text" class="url-input" id="urlInput" readonly>
      <button class="copy-btn" onclick="copyUrl()">Copy</button>
    </div>
  </div>
  
  <div id="notification" class="notification"></div>

  <script>
    const editor = document.getElementById('editor');
    const charsEl = document.getElementById('chars');
    const tokensEl = document.getElementById('tokens');
    const sizeEl = document.getElementById('size');
    const formatEl = document.getElementById('format');
    const urlDisplay = document.getElementById('urlDisplay');
    const urlInput = document.getElementById('urlInput');
    const shareBtn = document.getElementById('shareBtn');
    const notification = document.getElementById('notification');
    
    let currentSlug = null;
    let currentUrl = null;
    
    // Load from URL hash or slug on page load
    if (location.hash.length > 1) {
      loadFromHash();
    } else if (location.pathname.length > 1 && !location.pathname.startsWith('/api/')) {
      loadFromSlug();
    }
    
    // Update stats on every keystroke
    editor.addEventListener('input', updateStats);
    
    function updateStats() {
      const content = editor.value;
      const chars = content.length;
      const bytes = new Blob([content]).size;
      const tokens = Math.ceil(chars / 4); // Simple token estimation
      
      charsEl.textContent = chars.toLocaleString();
      tokensEl.textContent = tokens.toLocaleString();
      sizeEl.textContent = formatBytes(bytes);
      
      // Auto-detect format
      const format = detectFormat(content);
      formatEl.textContent = format;
    }
    
    function detectFormat(content) {
      if (!content.trim()) return 'text';
      try {
        JSON.parse(content);
        return 'json';
      } catch {
        return 'text';
      }
    }
    
    function formatBytes(bytes) {
      if (bytes === 0) return '0 B';
      const k = 1024;
      const sizes = ['B', 'KB', 'MB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }
    
    async function shareDocument() {
      const content = editor.value;
      
      if (!content.trim()) {
        showNotification('Please enter some content first');
        return;
      }
      
      shareBtn.disabled = true;
      shareBtn.textContent = 'Saving...';
      
      try {
        const response = await fetch('/api/compress', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content: content,
            format: detectFormat(content)
          })
        });
        
        if (!response.ok) {
          throw new Error('Failed to save');
        }
        
        const data = await response.json();
        currentSlug = data.slug;
        currentUrl = data.url.replace('http://', 'https://').replace('/api/documents/', '/');
        
        // Update URL bar without reloading
        history.replaceState(null, '', '/' + currentSlug);
        
        // Show URL in toolbar
        urlInput.value = currentUrl;
        urlDisplay.style.display = 'flex';
        
        showNotification('Document saved! URL ready to copy');
        
      } catch (err) {
        showNotification('Error: ' + err.message);
      } finally {
        shareBtn.disabled = false;
        shareBtn.textContent = 'Share';
      }
    }
    
    function copyUrl() {
      if (currentUrl) {
        urlInput.select();
        document.execCommand('copy');
        showNotification('URL copied to clipboard!');
      }
    }
    
    function loadFromHash() {
      try {
        const hash = location.hash.slice(1);
        const data = JSON.parse(atob(hash));
        editor.value = data.c || '';
        updateStats();
      } catch (e) {
        console.error('Failed to load from hash:', e);
      }
    }
    
    async function loadFromSlug() {
      const slug = location.pathname.slice(1);
      if (!slug || slug.includes('.')) return;
      
      try {
        const response = await fetch('/api/documents/' + slug);
        if (!response.ok) throw new Error('Not found');
        
        const data = await response.json();
        
        // Fetch actual content
        const contentResponse = await fetch('/api/decompress', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug: slug })
        });
        
        if (!contentResponse.ok) throw new Error('Content not found');
        
        const contentData = await contentResponse.json();
        editor.value = contentData.content;
        updateStats();
        
        // Setup share state
        currentSlug = slug;
        currentUrl = window.location.origin + '/' + slug;
        urlInput.value = currentUrl;
        urlDisplay.style.display = 'flex';
        
      } catch (e) {
        console.error('Failed to load document:', e);
      }
    }
    
    function showNotification(message) {
      notification.textContent = message;
      notification.classList.add('show');
      setTimeout(() => {
        notification.classList.remove('show');
      }, 3000);
    }
    
    // Initial stats update
    updateStats();
  </script>
</body>
</html>
